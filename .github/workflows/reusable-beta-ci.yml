# DEPRECATED — DO NOT USE.
#
# Merged into reusable-ci.yml, which now handles both beta and release channels via a
# `channel: beta|release` input (plus tag creation, changelog generation, and a GitHub
# Release, which this file's flow did not have). Update your caller to:
#
#   uses: KiarashMinoo/.github/.github/workflows/reusable-ci.yml@main
#   with:
#     channel: beta
#     # ...same other inputs you were already passing here...
#
# Changed from `on: workflow_call` to `on: workflow_dispatch` (manual only) so nothing
# can call this as a reusable workflow anymore, while still keeping the file a
# syntactically valid workflow (GitHub requires every file under .github/workflows/ to
