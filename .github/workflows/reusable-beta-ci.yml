# intentional no-op. Safe to delete this file entirely whenever convenient
# (git rm .github/workflows/reusable-beta-ci.yml).

name: DEPRECATED - Reusable Beta CI (merged into reusable-ci.yml, do not call)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  noop:
    name: Deprecated - does nothing
    runs-on: ubuntu-latest
    steps:
      - name: Deprecation notice
        run: |
          echo "This workflow is deprecated. Use reusable-ci.yml with channel: beta instead. Delete this file."
