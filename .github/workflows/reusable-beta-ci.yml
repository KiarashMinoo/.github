name: Reusable — Beta CI (develop)

on:
  workflow_call:
    inputs:
      dotnet-versions:
        description: .NET SDK versions to install
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      nuget-filter-enabled:
        description: Enable NuGet package filtering during publish
        type: boolean
        default: false
      nuget-filter-pattern:
        description: Regex pattern used when nuget-filter-enabled is true
        type: string
        default: '^(?!.*\.(Debug|ARM64|x86|x64)).*\.nupkg$'
      platforms:
        description: JSON array of platforms to build (e.g. '["AnyCpu","x64"]')
        type: string
        default: '["AnyCpu", "x86", "x64", "ARM64"]'
      configurations:
        description: JSON array of build configurations (e.g. '["Release"]')
        type: string
        default: '["Debug", "Release"]'
      runner-os:
        description: JSON array of runner OS labels (e.g. '["ubuntu-latest"]')
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      gh-token:
        description: GitHub token for release notes
        required: true
    outputs:
      version:
        description: The bumped -beta.N version (e.g. 1.2.3-beta.4), for callers that need to check out the tag or publish packages
        value: ${{ jobs.bump-beta.outputs.version }}

permissions:
  contents: read
  actions: none
  packages: read

jobs:
  # --- 1) bump on develop: patch++ & -beta.N, commit with version in message, TAG ---
  bump-beta:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.gh-token }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Bump version using helper script (or update .csproj if no Directory.Build.props)
        id: bump
        shell: pwsh
        run: |
          if (Test-Path 'Directory.Build.props') {
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel beta -CommitAndTag
          } else {
            Write-Host 'Directory.Build.props not found, will update .csproj files directly'
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel beta -CommitAndTag -UpdateCsproj
          }

  # --- 2) pack matrix (sln only), add filtered release notes, upload artifacts ---
  pack:
    needs: bump-beta
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.runner-os) }}
        platform_in: ${{ fromJson(inputs.platforms) }}
        configuration: ${{ fromJson(inputs.configurations) }}

    steps:
      - name: Checkout bumped tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ needs.bump-beta.outputs.version }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Show version from checked-out ref
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/show-version.ps1
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Generate release notes
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/generate-release-notes.ps1 `
            -Before "${{ github.event.before }}" `
            -After "${{ github.sha }}" `
            -SetGitHubEnv

      - name: Build and Pack
        id: pack
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          $releaseNotes = if ($env:REL_NOTES) { $env:REL_NOTES } else { "" }
          $solutionPath = "${{ inputs.solution-path }}"
          if (-not [System.Management.Automation.WildcardPattern]::ContainsWildcardCharacters($solutionPath) -and -not (Test-Path $solutionPath)) {
            Write-Host "Provided solution path '$solutionPath' not found. Falling back to '**/*.sln*'."
            $solutionPath = '**/*.sln*'
          }
          $params = @{
            Configuration = "${{ matrix.configuration }}"
            Platform = "${{ matrix.platform_in }}"
            SolutionPath = $solutionPath
            ReleaseNotes = $releaseNotes
          }
          pwsh ./.ci-scripts/.github/scripts/pack-solution.ps1 @params

      - name: Upload packages artifact (unique per leg)
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.nupkg
          if-no-files-found: error

      - name: Upload symbols (optional, unique per leg)
        if: ${{ hashFiles('artifacts/pkg/*.snupkg') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: symbols-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.snupkg
          if-no-files-found: ignore

  # --- 3) publish to NuGet.org and cleanup artifacts ---
  # NOTE: NuGet.org Trusted Publishing validates the exact repo + workflow file
  # that runs the `NuGet/login` OIDC step. Because this reusable workflow lives
  # in the public KiarashMinoo/.github repo, that login step CANNOT live here —
  # any external repo could otherwise call this workflow and mint a temporary
  # publish key for your packages. Each caller repo must therefore add its own
  # small "publish-nuget" job (NuGet/login + dotnet nuget push) directly in its
  # own workflow file, using the `pkg-*` / `symbols-*` artifacts uploaded above,
  # and then call reusable-cleanup-artifacts.yml once publishing is done.
