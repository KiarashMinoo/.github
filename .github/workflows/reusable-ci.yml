name: Reusable — CI (beta + release, unified)

# Single reusable workflow for both channels (replaces reusable-beta-ci.yml and
# reusable-release-ci.yml, now deprecated stubs). Flow, per the executing branch:
#   1) Bump version based on `channel` (beta|release), generate a CHANGELOG.md section
#      + release notes for everything since the previous tag, commit both together and
#      push to the executing branch, then ALWAYS tag that commit (regardless of
#      channel) and create a GitHub Release from the generated notes (prerelease for
#      channel: beta).
#   2) Build -> optional test -> pack matrix (platforms x configurations x runner-os),
#      upload artifacts.
#   3) Publish packages -- nuget.org (classic API key by default, or Trusted Publishing
#      OIDC if nuget-auth-mode: 'oidc') or GitHub Packages, per nuget-target.
#   4) Optionally delete run artifacts.
#
# No develop-branch sync job -- several callers don't have a develop branch at all, and
# the ones that do can just let their next beta run pick up the released version
# naturally (or sync it manually) rather than this workflow assuming develop exists.

on:
  workflow_call:
    inputs:
      channel:
        description: Which SemVer channel this run bumps -- 'beta' or 'release'
        type: string
        required: true
      bump-component:
        description: >
          Which version component to bump (major/minor/patch) when starting fresh from a
          version with no prerelease suffix (first beta after a release, or a release-only
          flow with no beta stage, e.g. IIIF). Default 'major' matches the original
          protocol (one major bump per beta cycle / release-only push). Use 'minor' for
          repos that should grow the minor version and keep major fixed instead.
        type: string
        default: 'major'
      create-github-release:
        description: Create a GitHub Release (with the generated changelog section as its body) for the new tag
        type: boolean
        default: true
      dotnet-versions:
        description: .NET SDK versions to install
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      nuget-filter-enabled:
        description: Enable NuGet package filtering during publish
        type: boolean
        default: false
      nuget-filter-pattern:
        description: Regex pattern used when nuget-filter-enabled is true
        type: string
        default: '^(?!.*\.(Debug|ARM64|x86|x64)).*\.nupkg$'
      platforms:
        description: JSON array of platforms to build (e.g. '["AnyCpu","x64"]')
        type: string
        default: '["AnyCpu", "x86", "x64", "ARM64"]'
      configurations:
        description: JSON array of build configurations (e.g. '["Release"]')
        type: string
        default: '["Debug", "Release"]'
      runner-os:
        description: JSON array of runner OS labels (e.g. '["ubuntu-latest"]')
        type: string
        default: '["ubuntu-latest"]'
      publish-to-nuget:
        description: Publish packed packages
        type: boolean
        default: true
      cleanup-artifacts:
        description: Delete all run artifacts after publishing
        type: boolean
        default: true
      nuget-target:
        description: Where to publish packages -- 'nuget.org' or 'github-packages' (token push)
        type: string
        default: 'nuget.org'
      nuget-auth-mode:
        description: >
          How to authenticate the nuget.org push when nuget-target is 'nuget.org'
          (ignored otherwise) -- 'classic' (a plain API key, via secrets.nuget-api-key)
          or 'oidc' (Trusted Publishing via NuGet/login). Default 'classic': a classic
          API key is a plain bearer token, so it works correctly from inside this
          shared workflow. 'oidc' is kept only for callers that want to try Trusted
          Publishing anyway, but be aware it currently does NOT work here -- nuget.org
          validates the OIDC token's job_workflow_ref claim against the exact repo +
          workflow file path that runs the NuGet/login step, and that always resolves
          to THIS file's own repo (KiarashMinoo/.github), never the calling repo, no
          matter how the trust policy is configured. Confirmed as a currently
          unresolved upstream limitation, not a config mistake: github.com/NuGet/login
          issues #6 ("Organization Packages Policy couldn't found when using Reusable
          Workflow") and #24 ("Support for reusable workflows in different
          repositories"), both open as of 2026-07.
        type: string
        default: 'classic'
      pre-build-command:
        description: Optional shell command run before Build (e.g. npm/gulp frontend asset build). No-op when empty.
        type: string
        default: ''
      test-command:
        description: Optional shell command run after Build, before Pack (e.g. dotnet test / ArchTests). No-op when empty.
        type: string
        default: ''
      post-pack-command:
        description: Optional shell command run after Pack (e.g. smoke-test against packed nupkgs). No-op when empty.
        type: string
        default: ''
      pack-project-paths:
        description: Optional newline/comma-separated list of explicit .csproj paths to pack instead of the whole solution (use when Directory.Build.props sets IsPackable=true globally, so a solution-wide pack would also try to pack test/example projects). No-op when empty.
        type: string
        default: ''
    secrets:
      gh-token:
        description: GitHub token for pushing the version/changelog commit, tagging, creating the Release, and artifact cleanup
        required: true
      push-token:
        description: >
          Optional override credential used ONLY for the version job's initial checkout
          (which sets up the git credential that commit-tag-push.ps1's later `git push`
          / tag push reuse) -- falls back to gh-token when not supplied. Needed when the
          executing branch has a classic "Require a pull request before merging" branch
          protection rule with no usable bypass for the default GITHUB_TOKEN identity
          (github-actions[bot]): classic protection's only bypass is an
          "administrators can bypass" toggle tied to a real admin-role account, and
          Ruleset bypass lists on personal (non-org) repos are often limited to role-
          based actors too, neither of which the default token can satisfy. Set this to
          a Personal Access Token belonging to an account with Admin role on the repo
          (and add that role to the branch protection/ruleset's bypass list) to let the
          automated commit push through as that account instead.
        required: false
      nuget-api-key:
        description: Classic NuGet.org API key (nuget.org > API Keys), used when nuget-target is nuget.org and nuget-auth-mode is 'classic' (the default).
        required: false
      nuget-user:
        description: NuGet.org profile name for Trusted Publishing OIDC login, used only when nuget-target is nuget.org and nuget-auth-mode is 'oidc'. See that input's description for why OIDC doesn't currently work from here.
        required: false
    outputs:
      version:
        description: The bumped version for this run (e.g. 1.2.3 or 1.2.3-beta.4), for callers that need to reference the version or publish packages
        value: ${{ jobs.version.outputs.version }}
      sha:
        description: The commit SHA the version bump + changelog were pushed as, for callers that need to check out the exact commit
        value: ${{ jobs.version.outputs.sha }}
      tag:
        description: The tag created for this run (e.g. v1.2.3 or v1.2.3-beta.4)
        value: ${{ jobs.version.outputs.tag }}

permissions:
  contents: read
  actions: none
  packages: read

jobs:
  # --- 1) bump version -> generate changelog -> commit both -> tag -> push -> GitHub Release ---
  version:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required to push the commit, push the tag, and create the Release
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.committag.outputs.sha }}
      tag: ${{ steps.committag.outputs.tag }}
    steps:
      - name: Validate channel input
        shell: bash
        run: |
          case "${{ inputs.channel }}" in
            beta|release) ;;
            *) echo "::error::channel input must be 'beta' or 'release', got '${{ inputs.channel }}'"; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # push-token (if supplied) overrides gh-token here ONLY -- this is what sets
          # up the git credential the later `git push` / tag push in
          # commit-tag-push.ps1 actually reuses, so this is the one checkout that needs
          # to authenticate as an account that can satisfy a branch-protection bypass.
          token: ${{ secrets.push-token != '' && secrets.push-token || secrets.gh-token }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Bump version (files only, not committed yet)
        id: bump
        shell: pwsh
        run: |
          if (Test-Path 'Directory.Build.props') {
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel ${{ inputs.channel }} -BumpComponent ${{ inputs.bump-component }}
          } else {
            Write-Host 'Directory.Build.props not found, will update .csproj files directly'
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel ${{ inputs.channel }} -BumpComponent ${{ inputs.bump-component }} -UpdateCsproj
          }

      - name: Generate changelog (since previous tag) and release notes
        id: changelog
        shell: pwsh
        run: |
          # NOTE: tracked in the repo as Generate-Changelog.ps1 (capital G/C) -- a prior
          # attempt to rename it to all-lowercase got stuck behind a git index lock and
          # never landed, and Linux Actions runners are case-sensitive, so this path must
          # match the actual tracked casing exactly.
          pwsh ./.ci-scripts/.github/scripts/Generate-Changelog.ps1 -Version "${{ steps.bump.outputs.version }}"

      - name: Commit version bump + changelog, push, tag, push tag
        id: committag
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/commit-tag-push.ps1 -Version "${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        if: inputs.create-github-release && steps.committag.outputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          TAG="${{ steps.committag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping (idempotent re-run)."
          else
            PRERELEASE_FLAG=()
            if [ "${{ inputs.channel }}" = "beta" ]; then PRERELEASE_FLAG=(--prerelease); fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --target "${{ steps.committag.outputs.sha }}" \
              "${PRERELEASE_FLAG[@]}"
          fi

  # --- 2) build -> optional test -> pack matrix & upload artifacts ---
  pack:
    needs: version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.runner-os) }}
        platform_in: ${{ fromJson(inputs.platforms) }}
        configuration: ${{ fromJson(inputs.configurations) }}
    steps:
      - name: Checkout version-bump commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.sha }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Show version from checked-out ref
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/show-version.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Generate release notes
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/generate-release-notes.ps1 `
            -Before "${{ github.event.before }}" `
            -After "${{ github.sha }}" `
            -SetGitHubEnv

      - name: Run pre-build command
        if: inputs.pre-build-command != ''
        shell: bash
        run: ${{ inputs.pre-build-command }}

      - name: Build
        id: build
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          $solutionPath = "${{ inputs.solution-path }}"
          if (-not [System.Management.Automation.WildcardPattern]::ContainsWildcardCharacters($solutionPath) -and -not (Test-Path $solutionPath)) {
            Write-Host "Provided solution path '$solutionPath' not found. Falling back to '**/*.sln*'."
            $solutionPath = '**/*.sln*'
          }
          $params = @{
            Configuration = "${{ matrix.configuration }}"
            Platform = "${{ matrix.platform_in }}"
            SolutionPath = $solutionPath
            SkipPack = $true
          }
          pwsh ./.ci-scripts/.github/scripts/pack-solution.ps1 @params

      - name: Run tests
        if: inputs.test-command != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: ${{ inputs.test-command }}

      - name: Pack
        id: pack
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          $releaseNotes = if ($env:REL_NOTES) { $env:REL_NOTES } else { "" }
          $solutionPath = "${{ inputs.solution-path }}"
          if (-not [System.Management.Automation.WildcardPattern]::ContainsWildcardCharacters($solutionPath) -and -not (Test-Path $solutionPath)) {
            Write-Host "Provided solution path '$solutionPath' not found. Falling back to '**/*.sln*'."
            $solutionPath = '**/*.sln*'
          }
          $params = @{
            Configuration = "${{ matrix.configuration }}"
            Platform = "${{ matrix.platform_in }}"
            SolutionPath = $solutionPath
            SkipClean = $true
            SkipRestore = $true
            SkipBuild = $true
            ReleaseNotes = $releaseNotes
          }
          $projectPaths = "${{ inputs.pack-project-paths }}"
          if (-not [string]::IsNullOrWhiteSpace($projectPaths)) {
            $params.ProjectPaths = $projectPaths
          }
          pwsh ./.ci-scripts/.github/scripts/pack-solution.ps1 @params

      - name: Run post-pack command
        if: inputs.post-pack-command != ''
        shell: bash
        run: ${{ inputs.post-pack-command }}

      - name: Upload packages artifact (unique per leg)
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.nupkg
          if-no-files-found: error

      - name: Upload symbols (optional, unique per leg)
        if: ${{ hashFiles('artifacts/pkg/*.snupkg') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: symbols-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.snupkg
          if-no-files-found: ignore

  # --- 3) publish packages ---
  # nuget.org auth (see nuget-auth-mode input): 'classic' (default) pushes with a plain
  # API key via secrets.nuget-api-key -- no OIDC, no trust policy, so it works fine from
  # inside this shared workflow. 'oidc' uses NuGet/login + Trusted Publishing, but that
  # currently does NOT work here: nuget.org validates the OIDC token's job_workflow_ref
  # claim against the exact repo + workflow file path that runs the NuGet/login step,
  # which always resolves to KiarashMinoo/.github/.github/workflows/reusable-ci.yml@main
  # (this file's own repo), never the calling repo -- confirmed via github.com/NuGet/login
  # issues #6 and #24 (both open as of 2026-07). Kept available only for callers that
  # want to experiment with it anyway.
  publish-nuget:
    name: Publish packages (${{ inputs.channel }})
    needs: [version, pack]
    if: inputs.publish-to-nuget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for Trusted Publishing OIDC (nuget-target: nuget.org, nuget-auth-mode: oidc)
      packages: write # required for GitHub Packages (nuget-target: github-packages)
    steps:
      - name: Checkout version-bump commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Download all packages artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pkg-*
          path: ./dist/packages
          merge-multiple: true

      - name: Download all symbols artifacts (optional)
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: symbols-*
          path: ./dist/symbols
          merge-multiple: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      # NuGet feeds occasionally answer a good push with a transient 403 (auth/permission
      # propagation lag right after a key/OIDC token is issued) or 429 (per-key/per-IP rate
      # limit) -- both clear up on their own within seconds to a couple of minutes. Retrying
      # any other failure (bad package, 400, real 401/403 auth failure, etc.) would just waste
      # 5 attempts on something that will never succeed, so only these two codes trigger a
      # retry; everything else fails the step immediately, same as before.
      - name: Prepare NuGet push retry helper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/push-with-retry.sh" <<'EOF'
          push_with_retry() {
            local file="$1" source_arg="$2" api_key="$3"
            local max_attempts=5 attempt=1 delay=5
            while true; do
              local output
              output=$(dotnet nuget push "$file" --api-key "$api_key" --source "$source_arg" --skip-duplicate 2>&1)
              local status=$?
              echo "$output"
              if [ $status -eq 0 ]; then
                return 0
              fi
              if echo "$output" | grep -qE 'indicate success: (403|429)'; then
                if [ $attempt -ge $max_attempts ]; then
                  echo "::error::Exhausted $max_attempts attempts pushing $(basename "$file") (403/429)"
                  return 1
                fi
                echo "::warning::Transient 403/429 pushing $(basename "$file") (attempt $attempt/$max_attempts) — retrying in ${delay}s"
                sleep $delay
                delay=$((delay * 2))
                attempt=$((attempt + 1))
                continue
              fi
              return $status
            done
          }
          EOF

      - name: NuGet login (OIDC to temp API key — Trusted Publishing)
        if: inputs.nuget-target == 'nuget.org' && inputs.nuget-auth-mode == 'oidc'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.nuget-user }}

      - name: Publish packages to NuGet.org (classic API key)
        if: inputs.nuget-target == 'nuget.org' && inputs.nuget-auth-mode == 'classic'
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.nuget-api-key }}
        run: |
          source "$RUNNER_TEMP/push-with-retry.sh"
          shopt -s nullglob
          for package in ./dist/packages/*.nupkg; do
            push_with_retry "$package" https://api.nuget.org/v3/index.json "$NUGET_API_KEY" || exit 1
          done
          for symbols in ./dist/symbols/*.snupkg; do
            push_with_retry "$symbols" https://api.nuget.org/v3/index.json "$NUGET_API_KEY" || exit 1
          done

      - name: Publish packages to NuGet.org (OIDC Trusted Publishing)
        if: inputs.nuget-target == 'nuget.org' && inputs.nuget-auth-mode == 'oidc'
        shell: bash
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          source "$RUNNER_TEMP/push-with-retry.sh"
          shopt -s nullglob
          for package in ./dist/packages/*.nupkg; do
            push_with_retry "$package" https://api.nuget.org/v3/index.json "$NUGET_API_KEY" || exit 1
          done
          for symbols in ./dist/symbols/*.snupkg; do
            push_with_retry "$symbols" https://api.nuget.org/v3/index.json "$NUGET_API_KEY" || exit 1
          done

      - name: Publish packages to GitHub Packages
        if: inputs.nuget-target == 'github-packages'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          source "$RUNNER_TEMP/push-with-retry.sh"
          shopt -s nullglob
          dotnet nuget add source --username github --password "$GH_TOKEN" --store-password-in-clear-text --name github-packages "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          for package in ./dist/packages/*.nupkg; do
            push_with_retry "$package" github-packages "$GH_TOKEN" || exit 1
          done
          for symbols in ./dist/symbols/*.snupkg; do
            push_with_retry "$symbols" github-packages "$GH_TOKEN" || exit 1
          done

  cleanup-nuget-artifacts:
    name: Delete run artifacts
    needs: publish-nuget
    if: always() && inputs.publish-to-nuget && inputs.cleanup-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - name: Delete ALL run artifacts
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[].id' | while read -r id; do
              gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE
            done
