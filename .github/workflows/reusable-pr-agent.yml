name: PR-Agent AI Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  workflow_call:
    secrets:
      OPENAI_KEY:
        required: true
      NVIDIA_NIM_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: PR Agent Review
        uses: The-PR-Agent/pr-agent@v0.39.0

        env:
          # =====================================================
          # Authentication
          # =====================================================
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENAI_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}

          # =====================================================
          # Provider Routing
          # Keep the global OpenAI base unset so LiteLLM can route each
          # fallback by provider prefix:
          # - openrouter/... -> OpenRouter
          # - nvidia_nim/... -> direct NVIDIA NIM
          # =====================================================

          # =====================================================
          # Primary Model (Fastest Free)
          # =====================================================
          CONFIG.MODEL: openrouter/openai/gpt-oss-20b:free

          # =====================================================
          # Extended Fallback Models
          # Ordered fastest/smallest -> larger. Keep both OpenRouter and
          # direct NVIDIA NIM entries so CI can fall through provider
          # outages and free-tier rate limits quickly.
          # =====================================================
          CONFIG.FALLBACK_MODELS: >
            [
              "openrouter/meta-llama/llama-3.2-3b-instruct:free",
              "openrouter/liquid/lfm-2.5-1.2b-instruct:free",
              "openrouter/nvidia/nemotron-nano-9b-v2:free",
              "openrouter/nvidia/nemotron-3-nano-30b-a3b:free",
              "openrouter/cohere/north-mini-code:free",
              "openrouter/qwen/qwen3-coder:free",
              "openrouter/meta-llama/llama-3.3-70b-instruct:free",
              "openrouter/openai/gpt-oss-120b:free",
              "nvidia_nim/meta/llama-3.2-1b-instruct",
              "nvidia_nim/meta/llama-3.2-3b-instruct",
              "nvidia_nim/nvidia/nemotron-mini-4b-instruct",
              "nvidia_nim/microsoft/phi-4-mini-instruct",
              "nvidia_nim/microsoft/phi-4-mini-flash-reasoning",
              "nvidia_nim/mistralai/mistral-7b-instruct-v0.3",
              "nvidia_nim/nvidia/nvidia-nemotron-nano-9b-v2",
              "nvidia_nim/nvidia/llama-3.1-nemotron-nano-8b-v1",
              "nvidia_nim/openai/gpt-oss-20b",
              "nvidia_nim/nvidia/nemotron-3-nano-30b-a3b",
              "nvidia_nim/qwen/qwen2.5-coder-32b-instruct",
              "nvidia_nim/qwen/qwen3-coder-480b-a35b-instruct"
            ]

          # =====================================================
          # LiteLLM Reliability
          # Low retry/wait so a stuck free model fails over fast instead
          # of burning the job timeout on retries.
          # =====================================================
          LITELLM.DROP_PARAMS: "true"
          LITELLM.RETRY: "1"
          LITELLM.RETRY_WAIT: "2"
          LITELLM.TIMEOUT: "20"

          # =====================================================
          # Speed Optimizations
          # =====================================================
          CONFIG.MAX_DESCRIPTION_TOKENS: "300"

          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "12000"
          CONFIG.MAX_MODEL_TOKENS: "12000"
          CONFIG.MAX_CONTEXT_TOKENS: "16000"

          CONFIG.TEMPERATURE: "0"

          # =====================================================
          # Lightweight Review Features
          # =====================================================
          PR_REVIEWER.REQUIRE_SCORE_REVIEW: "true"

          # Keep security review enabled
          PR_REVIEWER.REQUIRE_SECURITY_REVIEW: "true"

          # Disable slower secondary reviews
          PR_REVIEWER.REQUIRE_TESTS_REVIEW: "false"
          PR_REVIEWER.REQUIRE_ESTIMATE_EFFORT_TO_REVIEW: "false"

          # Security labels
          PR_REVIEWER.ENABLE_REVIEW_LABELS_SECURITY: "true"

          # =====================================================
          # Inline Suggestions
          # =====================================================
          PR_REVIEWER.INLINE_CODE_COMMENTS: "true"

          PR_REVIEWER.NUM_CODE_SUGGESTIONS: "1"

          PR_CODE_SUGGESTIONS.NUM_CODE_SUGGESTIONS: "1"
          PR_CODE_SUGGESTIONS.COMMITABLE_CODE_SUGGESTIONS: "false"

          # =====================================================
          # Disable Extra Generation
          # =====================================================
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: "false"
          PR_DESCRIPTION.USE_DESCRIPTION_MARKERS: "false"

          # =====================================================
          # Focused Enterprise .NET + Security Review
          # =====================================================
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            Review only critical and high-impact issues.

            Focus on:
            - bugs
            - race conditions
            - thread safety
            - async/await misuse
            - deadlocks
            - cancellation propagation
            - EF Core N+1 queries
            - transaction consistency
            - null safety
            - DI lifetime issues
            - major performance bottlenecks

            Security checks:
            - secrets exposure
            - hardcoded credentials
            - insecure configuration
            - missing authorization
            - authentication flaws
            - privilege escalation risks
            - insecure deserialization
            - SQL injection risks
            - command injection risks
            - SSRF vulnerabilities
            - XSS vulnerabilities
            - CSRF issues
            - path traversal
            - unsafe file handling
            - weak cryptography usage
            - insecure token handling
            - sensitive data leakage
            - missing input validation
            - insecure logging of sensitive data

            Ignore:
            - style
            - formatting
            - naming
            - low-impact suggestions
            - minor optimizations

            Keep comments:
            - short
            - technical
            - actionable
            - fix-oriented
