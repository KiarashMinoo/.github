name: Reusable — Release CI (release/*)

on:
  workflow_call:
    inputs:
      dotnet-versions:
        description: .NET SDK versions to install
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      nuget-filter-enabled:
        description: Enable NuGet package filtering during publish
        type: boolean
        default: false
      nuget-filter-pattern:
        description: Regex pattern used when nuget-filter-enabled is true
        type: string
        default: '^(?!.*\.(Debug|ARM64|x86|x64)).*\.nupkg$'
      platforms:
        description: JSON array of platforms to build (e.g. '["AnyCpu","x64"]')
        type: string
        default: '["AnyCpu", "x86", "x64", "ARM64"]'
      configurations:
        description: JSON array of build configurations (e.g. '["Release"]')
        type: string
        default: '["Debug", "Release"]'
      runner-os:
        description: JSON array of runner OS labels (e.g. '["ubuntu-latest"]')
        type: string
        default: '["ubuntu-latest"]'
      publish-to-nuget:
        description: Publish packed packages
        type: boolean
        default: true
      cleanup-artifacts:
        description: Delete all run artifacts after publishing
        type: boolean
        default: true
      nuget-target:
        description: Where to publish packages -- 'nuget.org' (Trusted Publishing OIDC) or 'github-packages' (token push)
        type: string
        default: 'nuget.org'
      pre-build-command:
        description: Optional shell command run before Build (e.g. npm/gulp frontend asset build). No-op when empty.
        type: string
        default: ''
      test-command:
        description: Optional shell command run after Build, before Pack (e.g. dotnet test / ArchTests). No-op when empty.
        type: string
        default: ''
      post-pack-command:
        description: Optional shell command run after Pack (e.g. smoke-test against packed nupkgs). No-op when empty.
        type: string
        default: ''
      pack-project-paths:
        description: Optional newline/comma-separated list of explicit .csproj paths to pack instead of the whole solution (use when Directory.Build.props sets IsPackable=true globally, so a solution-wide pack would also try to pack test/example projects). No-op when empty.
        type: string
        default: ''
    secrets:
      gh-token:
        description: GitHub token for releases, package publishing, and artifact cleanup
        required: true
      nuget-user:
        description: NuGet.org profile name for Trusted Publishing OIDC login (required when publish-to-nuget is true and nuget-target is nuget.org)
        required: false
    outputs:
      version:
        description: The finalized release version (e.g. 1.2.3), for callers that need to check out the tag or publish packages
        value: ${{ jobs.finalize-and-tag.outputs.version }}

permissions:
  contents: read
  actions: none
  packages: read

jobs:
  # --- 1) finalize version: strip -beta.* (or bump patch if release-only, no beta stage), commit if changed, create & push tag, GH Release ---
  finalize-and-tag:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required to push the version-bump commit/tag and create the GitHub Release
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.gh-token }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Finalize version (strip prerelease, or bump patch for release-only flows) using helper script (or update .csproj if no Directory.Build.props)
        id: ver
        shell: pwsh
        run: |
          if (Test-Path 'Directory.Build.props') {
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel release -CommitAndTag
          } else {
            Write-Host 'Directory.Build.props not found, will update .csproj files directly'
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -Channel release -CommitAndTag -UpdateCsproj
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 2>$null
          if ($lastTag) {
            pwsh ./.ci-scripts/.github/scripts/generate-release-notes.ps1 -Before $lastTag -After HEAD
          } else {
            pwsh ./.ci-scripts/.github/scripts/generate-release-notes.ps1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: release-notes.txt
        env:
          GH_TOKEN: ${{ secrets.gh-token }}

  # --- 1b) propagate finalized version into 'develop' and push (no-op / harmless if repo has no develop branch to diverge from) ---
  sync-develop-version:
    needs: finalize-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # required to push the synced version commit to develop
    steps:
      - name: Checkout develop
        id: checkout-develop
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.gh-token }}

      - name: Checkout workflow scripts
        if: steps.checkout-develop.outcome == 'success'
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Update version on develop to release version (Directory.Build.props or .csproj)
        if: steps.checkout-develop.outcome == 'success'
        shell: pwsh
        env:
          STABLE_VERSION: ${{ needs.finalize-and-tag.outputs.version }}
        run: |
          if (Test-Path 'Directory.Build.props') {
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -SetVersion $env:STABLE_VERSION
          } else {
            Write-Host 'Directory.Build.props not found, will update .csproj files directly'
            pwsh ./.ci-scripts/.github/scripts/update-version.ps1 -SetVersion $env:STABLE_VERSION -UpdateCsproj
          }

      - name: Commit & push to develop (skip CI)
        if: steps.checkout-develop.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "No changes to commit on develop."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync version from release to develop [skip ci]"
          git fetch origin develop
          git pull --rebase origin develop
          git push origin HEAD:develop

  # --- 2) build -> optional test -> pack matrix & upload artifacts ---
  pack:
    needs: finalize-and-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.runner-os) }}
        platform_in: ${{ fromJson(inputs.platforms) }}
        configuration: ${{ fromJson(inputs.configurations) }}
    steps:
      - name: Checkout finalized tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ needs.finalize-and-tag.outputs.version }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          repository: KiarashMinoo/.github
          ref: main
          sparse-checkout: .github/scripts
          path: .ci-scripts
          token: ${{ secrets.gh-token }}

      - name: Show version from checked-out ref
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/show-version.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Generate release notes
        shell: pwsh
        run: |
          pwsh ./.ci-scripts/.github/scripts/generate-release-notes.ps1 `
            -Before "${{ github.event.before }}" `
            -After "${{ github.sha }}" `
            -SetGitHubEnv

      - name: Run pre-build command
        if: inputs.pre-build-command != ''
        shell: bash
        run: ${{ inputs.pre-build-command }}

      - name: Build
        id: build
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          $solutionPath = "${{ inputs.solution-path }}"
          if (-not [System.Management.Automation.WildcardPattern]::ContainsWildcardCharacters($solutionPath) -and -not (Test-Path $solutionPath)) {
            Write-Host "Provided solution path '$solutionPath' not found. Falling back to '**/*.sln*'."
            $solutionPath = '**/*.sln*'
          }
          $params = @{
            Configuration = "${{ matrix.configuration }}"
            Platform = "${{ matrix.platform_in }}"
            SolutionPath = $solutionPath
            SkipPack = $true
          }
          pwsh ./.ci-scripts/.github/scripts/pack-solution.ps1 @params

      - name: Run tests
        if: inputs.test-command != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: ${{ inputs.test-command }}

      - name: Pack
        id: pack
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          $releaseNotes = if ($env:REL_NOTES) { $env:REL_NOTES } else { "" }
          $solutionPath = "${{ inputs.solution-path }}"
          if (-not [System.Management.Automation.WildcardPattern]::ContainsWildcardCharacters($solutionPath) -and -not (Test-Path $solutionPath)) {
            Write-Host "Provided solution path '$solutionPath' not found. Falling back to '**/*.sln*'."
            $solutionPath = '**/*.sln*'
          }
          $params = @{
            Configuration = "${{ matrix.configuration }}"
            Platform = "${{ matrix.platform_in }}"
            SolutionPath = $solutionPath
            SkipClean = $true
            SkipRestore = $true
            SkipBuild = $true
            ReleaseNotes = $releaseNotes
          }
          $projectPaths = "${{ inputs.pack-project-paths }}"
          if (-not [string]::IsNullOrWhiteSpace($projectPaths)) {
            $params.ProjectPaths = $projectPaths
          }
          pwsh ./.ci-scripts/.github/scripts/pack-solution.ps1 @params

      - name: Run post-pack command
        if: inputs.post-pack-command != ''
        shell: bash
        run: ${{ inputs.post-pack-command }}

      - name: Upload packages artifact (unique per leg)
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.nupkg
          if-no-files-found: error

      - name: Upload symbols (optional, unique per leg)
        if: ${{ hashFiles('artifacts/pkg/*.snupkg') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: symbols-${{ matrix.configuration }}${{ steps.pack.outputs.artifact_suffix }}
          path: artifacts/pkg/*.snupkg
          if-no-files-found: ignore

  # --- 3) publish packages ---
  # SECURITY NOTE: nuget.org Trusted Publishing validates the exact repo AND
  # workflow file path that executes the `NuGet/login` step, via the
  # `job_workflow_ref` claim on the OIDC token. That means the trust policy
  # for any package published from here (when nuget-target is nuget.org) must
  # point at: KiarashMinoo/.github/.github/workflows/reusable-release-ci.yml@main
  # Because this repo is PUBLIC, any workflow anywhere that can call this
  # reusable workflow could in principle receive a temporary NuGet publish
  # key for whichever package's trust policy names this file. This mirrors
  # reusable-beta-ci.yml's own publish-nuget job exactly (same steps), so
  # both channels are treated identically — but each uses its OWN file path,
  # so nuget.org needs a separate trust policy entry per channel per package
  # (one entry for this file, one for reusable-beta-ci.yml).
  publish-nuget:
    name: Publish packages (release)
    needs: pack
    if: inputs.publish-to-nuget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for Trusted Publishing OIDC (nuget-target: nuget.org)
      packages: write # required for GitHub Packages (nuget-target: github-packages)
    steps:
      - name: Checkout tagged version
        uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.finalize-and-tag.outputs.version }}

      - name: Download all packages artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pkg-*
          path: ./dist/packages
          merge-multiple: true

      - name: Download all symbols artifacts (optional)
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: symbols-*
          path: ./dist/symbols
          merge-multiple: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: NuGet login (OIDC to temp API key — Trusted Publishing)
        if: inputs.nuget-target == 'nuget.org'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.nuget-user }}

      - name: Publish packages to NuGet.org
        if: inputs.nuget-target == 'nuget.org'
        shell: bash
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          for package in ./dist/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
          for symbols in ./dist/symbols/*.snupkg; do
            dotnet nuget push "$symbols" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish packages to GitHub Packages
        if: inputs.nuget-target == 'github-packages'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          shopt -s nullglob
          dotnet nuget add source --username github --password "$GH_TOKEN" --store-password-in-clear-text --name github-packages "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          for package in ./dist/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$GH_TOKEN" --source github-packages --skip-duplicate
          done
          for symbols in ./dist/symbols/*.snupkg; do
            dotnet nuget push "$symbols" --api-key "$GH_TOKEN" --source github-packages --skip-duplicate
          done

  cleanup-nuget-artifacts:
    name: Delete run artifacts
    needs: publish-nuget
    if: always() && inputs.publish-to-nuget && inputs.cleanup-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - name: Delete ALL run artifacts
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[].id' | while read -r id; do
              gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE
            done
