name: Reusable — Patch Management (Dependency Vulnerability & Update Audit)

on:
  workflow_call:
    inputs:
      dotnet-versions:
        description: .NET SDK versions to install
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      fail-on-vulnerable:
        description: Fail the workflow when packages with known CVEs are found
        type: boolean
        default: false
      fail-on-outdated:
        description: Fail the workflow when packages with available updates are found
        type: boolean
        default: false
      owasp-dc-version:
        description: OWASP Dependency-Check release to use
        type: string
        default: '12.1.1'
      owasp-fail-cvss:
        description: CVSS score threshold at which OWASP Dependency-Check flags CVEs (0–10)
        type: number
        default: 7
      email-to:
        description: Recipient email address for vulnerability reports
        type: string
        default: ''
      smtp-host:
        description: SMTP server hostname
        type: string
        default: 'smtp.gmail.com'
      smtp-port:
        description: SMTP server port
        type: number
        default: 587
    secrets:
      gh-token:
        description: GitHub token for uploading SARIF
        required: true
      nvd-api-key:
        description: NVD API key for faster CVE database downloads (optional but recommended)
        required: false
      smtp-username:
        description: SMTP username for sending email reports
        required: false
      smtp-password:
        description: SMTP password or app password for sending email reports
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  # ------------------------------------------------------------------
  # 1) .NET built-in package audit — fast, no extra tooling required
  # ------------------------------------------------------------------
  dotnet-audit:
    name: .NET Package Vulnerability Audit
    runs-on: ubuntu-latest
    outputs:
      vulnerable-found: ${{ steps.audit.outputs.vulnerable_found }}
      outdated-found: ${{ steps.outdated.outputs.outdated_found }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $slnFiles = Get-ChildItem -Recurse -Include "*.sln","*.slnx" |
            Where-Object { $_.FullName -notmatch 'node_modules|\.git|\.ci-scripts' }
          if ($slnFiles.Count -gt 0) {
            foreach ($sln in $slnFiles) {
              Write-Host "Restoring: $($sln.FullName)"
              dotnet restore $sln.FullName
            }
          } else {
            dotnet restore
          }

      - name: Audit for known CVEs (dotnet list package --vulnerable)
        id: audit
        shell: pwsh
        run: |
          $result = dotnet list package --vulnerable --include-transitive 2>&1
          $result | Tee-Object -FilePath vulnerable-packages.txt
          $found = ($result | Select-String "has the following vulnerable packages").Count -gt 0
          "vulnerable_found=$($found.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          if ($found -and '${{ inputs.fail-on-vulnerable }}' -eq 'true') {
            Write-Error "Vulnerable NuGet packages detected — review vulnerable-packages.txt"
            exit 1
          }

      - name: Check for available updates (dotnet list package --outdated)
        id: outdated
        shell: pwsh
        run: |
          $result = dotnet list package --outdated 2>&1
          $result | Tee-Object -FilePath outdated-packages.txt
          $found = ($result | Select-String "has the following updates available").Count -gt 0
          "outdated_found=$($found.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          if ($found -and '${{ inputs.fail-on-outdated }}' -eq 'true') {
            Write-Error "Outdated NuGet packages found — review outdated-packages.txt"
            exit 1
          }

      - name: Upload package audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-package-audit
          path: |
            vulnerable-packages.txt
            outdated-packages.txt
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # 2) OWASP Dependency-Check — deep CVE scan with NVD database
  # ------------------------------------------------------------------
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    outputs:
      cves-found: ${{ steps.owasp-findings.outputs.cves_found }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: '.'
          format: 'ALL'
          out: 'owasp-dc-report'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS ${{ inputs.owasp-fail-cvss }}
        env:
          NVD_API_KEY: ${{ secrets.nvd-api-key }}

      - name: Upload OWASP DC report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-check-report
          path: owasp-dc-report/
          if-no-files-found: warn

      - name: Check Code Scanning availability
        id: ghas
        if: always() && hashFiles('owasp-dc-report/dependency-check-report.sarif') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          http=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          [[ "$http" == "200" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Upload OWASP DC SARIF to GitHub Security
        if: always() && steps.ghas.outputs.enabled == 'true' && hashFiles('owasp-dc-report/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: owasp-dc-report/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Check OWASP findings count
        id: owasp-findings
        if: always() && hashFiles('owasp-dc-report/dependency-check-report.sarif') != ''
        shell: bash
        run: |
          count=$(python3 -c "
          import json
          with open('owasp-dc-report/dependency-check-report.sarif') as f:
              sarif = json.load(f)
          print(len(sarif.get('runs', [{}])[0].get('results', [])))
          " 2>/dev/null || echo "0")
          echo "cves_found=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # 3) Email report when vulnerabilities are found
  # ------------------------------------------------------------------
  notify-email:
    name: Email Vulnerability Report
    needs: [dotnet-audit, owasp-dependency-check]
    if: |
      always() &&
      inputs.email-to != '' &&
      (needs.dotnet-audit.outputs.vulnerable-found == 'true' ||
       needs.owasp-dependency-check.outputs.cves-found == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Build email body
        id: body
        shell: bash
        env:
          VULNERABLE: ${{ needs.dotnet-audit.outputs.vulnerable-found }}
          CVES: ${{ needs.owasp-dependency-check.outputs.cves-found }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          dotnet_status=$([ "${VULNERABLE}" = "true" ] && echo "VULNERABLE PACKAGES FOUND" || echo "Clean")
          owasp_status=$([ "${CVES}" = "true" ] && echo "CVEs DETECTED" || echo "Clean")

          {
            echo "content<<EOF"
            echo "Dependency Vulnerability Report"
            echo ""
            echo "Repository : ${{ github.repository }}"
            echo "Branch     : ${{ github.ref_name }}"
            echo "Triggered  : ${{ github.event_name }}"
            echo "Run URL    : ${RUN_URL}"
            echo ""
            echo "Scan Results"
            echo "------------"
            echo ".NET Package Audit    : ${dotnet_status}"
            echo "OWASP Dependency-Check: ${owasp_status}"
            echo ""
            echo "Download the full reports (XML, HTML, SARIF) from the workflow run artifacts:"
            echo "${RUN_URL}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send vulnerability report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ inputs.smtp-host }}
          server_port: ${{ inputs.smtp-port }}
          username: ${{ secrets.smtp-username }}
          password: ${{ secrets.smtp-password }}
          subject: "[Security] Vulnerable dependencies detected — ${{ github.repository }}"
          to: ${{ inputs.email-to }}
          from: GitHub Actions <${{ secrets.smtp-username }}>
          body: ${{ steps.body.outputs.content }}
