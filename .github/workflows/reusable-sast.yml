name: Reusable — SAST (Static Analysis Security Testing)

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of CodeQL languages (e.g. '["csharp","javascript"]')
        type: string
        default: '["csharp"]'
      dotnet-versions:
        description: .NET SDK versions to install (required when csharp is in languages)
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      enable-codeql:
        description: Run CodeQL analysis (requires GitHub Advanced Security on private repos)
        type: boolean
        default: true
      enable-devskim:
        description: Run DevSkim SAST analysis
        type: boolean
        default: true
      enable-secret-scan:
        description: Run TruffleHog secret scanning
        type: boolean
        default: true
      codeql-queries:
        description: CodeQL query suite — security-extended or security-and-quality
        type: string
        default: 'security-extended'
      codeql-build-mode:
        description: >
          CodeQL build mode — none (fastest, no compilation), autobuild (CodeQL-managed),
          or manual (custom dotnet build, most precise). Use manual only if none misses
          findings in your specific codebase.
        type: string
        default: 'none'
      fail-on-findings:
        description: Fail the workflow if any security findings are detected
        type: boolean
        default: false
    secrets:
      gh-token:
        description: GitHub token with security-events:write for SARIF uploads
        required: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ------------------------------------------------------------------
  # 1) Secret scanning — detect hardcoded credentials and API keys
  # ------------------------------------------------------------------
  secret-scan:
    if: ${{ inputs.enable-secret-scan }}
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '' }}
          head: ${{ github.sha }}
          extra_args: --only-verified --fail

  # ------------------------------------------------------------------
  # 2) CodeQL — multi-language semantic SAST via GitHub Security
  # ------------------------------------------------------------------
  codeql:
    if: ${{ inputs.enable-codeql }}
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(inputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.codeql-queries }}
          tools: latest
          build-mode: ${{ inputs.codeql-build-mode }}
          config: |
            paths-ignore:
              - '**/Tests/**'
              - '**/test/**'
              - '**/*.Tests/**'
              - '**/*.Test/**'
              - '**/Migrations/**'
              - '**/obj/**'
              - '**/bin/**'
              - '**/*.g.cs'
              - '**/*.generated.cs'

      - name: Setup .NET
        if: ${{ matrix.language == 'csharp' && inputs.codeql-build-mode == 'manual' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        if: ${{ matrix.language == 'csharp' && inputs.codeql-build-mode == 'manual' }}
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build C# for CodeQL
        if: ${{ matrix.language == 'csharp' && inputs.codeql-build-mode == 'manual' }}
        shell: bash
        run: |
          find . \( -name "*.csproj" -o -name "*.vbproj" \) \
               -not -path "*/obj/*" -not -path "*/bin/*" | \
          while IFS= read -r proj; do
            cat > "$(dirname "$proj")/GlobalUsings.CodeQL.cs" << 'CSEOF'
          global using System;
          global using System.Collections.Generic;
          global using System.IO;
          global using System.Linq;
          global using System.Net.Http;
          global using System.Threading;
          global using System.Threading.Tasks;
          CSEOF
          done
          sln=$(find . \( -name "*.sln" -o -name "*.slnx" \) \
                    -not -path "*/obj/*" -not -path "*/bin/*" | head -1)
          dotnet build ${sln:-.} \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Autobuild
        if: ${{ inputs.codeql-build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v4

      - name: Check Code Scanning availability
        id: ghas
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          http=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          [[ "$http" == "200" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          upload: ${{ steps.ghas.outputs.enabled == 'true' }}
          upload-database: false

  # ------------------------------------------------------------------
  # 3) DevSkim — pattern-based SAST with OWASP and security rule packs
  # ------------------------------------------------------------------
  devskim:
    if: ${{ inputs.enable-devskim }}
    name: DevSkim SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run DevSkim
        uses: microsoft/DevSkim-Action@v1
        with:
          directory-to-scan: .
          ignore-globs: |
            **/Tests/**
            **/test/**
            **/*.Tests/**
            **/*.Test/**
            **/Migrations/**
            **/obj/**
            **/bin/**
            **/*.g.cs
            **/*.generated.cs

      - name: Check Code Scanning availability
        id: ghas
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          http=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          [[ "$http" == "200" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Upload DevSkim SARIF to GitHub Security
        if: always() && steps.ghas.outputs.enabled == 'true' && hashFiles('DevSkim-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: DevSkim-results.sarif
          category: devskim

      - name: Upload DevSkim report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: devskim-sarif-report
          path: DevSkim-results.sarif
          if-no-files-found: ignore
