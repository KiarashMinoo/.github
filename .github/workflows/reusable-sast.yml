name: Reusable — SAST (Static Analysis Security Testing)

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of CodeQL languages (e.g. '["csharp","javascript"]')
        type: string
        default: '["csharp"]'
      dotnet-versions:
        description: .NET SDK versions to install (required when csharp is in languages)
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
      solution-path:
        description: Path to .sln/.slnx or project glob
        type: string
        default: '**/*.sln*'
      enable-codeql:
        description: Run CodeQL analysis (requires GitHub Advanced Security on private repos)
        type: boolean
        default: true
      enable-semgrep:
        description: Run Semgrep SAST analysis
        type: boolean
        default: true
      enable-gitleaks:
        description: Run Gitleaks secret scanning
        type: boolean
        default: true
      semgrep-config:
        description: Semgrep ruleset — auto, p/default, p/csharp, p/owasp-top-ten, or a file path
        type: string
        default: 'p/default'
      codeql-queries:
        description: CodeQL query suite — security-extended or security-and-quality
        type: string
        default: 'security-extended'
      fail-on-findings:
        description: Fail the workflow if any security findings are detected
        type: boolean
        default: false
    secrets:
      gh-token:
        description: GitHub token with security-events:write for SARIF uploads
        required: true
      semgrep-app-token:
        description: Semgrep App token (optional, enables Semgrep Cloud dashboard)
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ------------------------------------------------------------------
  # 1) Secret scanning — detect hardcoded credentials and API keys
  # ------------------------------------------------------------------
  gitleaks:
    if: ${{ inputs.enable-gitleaks }}
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.gh-token }}

  # ------------------------------------------------------------------
  # 2) CodeQL — multi-language semantic SAST via GitHub Security
  # ------------------------------------------------------------------
  codeql:
    if: ${{ inputs.enable-codeql }}
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(inputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.codeql-queries }}
          tools: latest

      - name: Setup .NET
        if: ${{ matrix.language == 'csharp' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-versions }}

      - name: Cache NuGet
        if: ${{ matrix.language == 'csharp' }}
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build C# for CodeQL
        if: ${{ matrix.language == 'csharp' }}
        shell: bash
        run: |
          # Inject standard global usings into every project so files that omit
          # explicit using directives (or rely on ImplicitUsings) always compile.
          find . \( -name "*.csproj" -o -name "*.vbproj" \) \
               -not -path "*/obj/*" -not -path "*/bin/*" | \
          while IFS= read -r proj; do
            cat > "$(dirname "$proj")/GlobalUsings.CodeQL.cs" <<'EOF'
          global using System;
          global using System.Collections.Generic;
          global using System.IO;
          global using System.Linq;
          global using System.Net.Http;
          global using System.Threading;
          global using System.Threading.Tasks;
          EOF
          done
          # Locate the solution file; fall back to current directory if none found
          sln=$(find . \( -name "*.sln" -o -name "*.slnx" \) \
                    -not -path "*/obj/*" -not -path "*/bin/*" | head -1)
          dotnet build ${sln:-.} \
            --configuration Release \
            /p:TreatWarningsAsErrors=false

      - name: Autobuild
        if: ${{ matrix.language != 'csharp' }}
        uses: github/codeql-action/autobuild@v4

      - name: Check Code Scanning availability
        id: ghas
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          http=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          [[ "$http" == "200" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          upload: ${{ steps.ghas.outputs.enabled == 'true' }}

  # ------------------------------------------------------------------
  # 3) Semgrep — pattern-based SAST with OWASP and custom rule packs
  # ------------------------------------------------------------------
  semgrep:
    if: ${{ inputs.enable-semgrep }}
    name: Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        shell: bash
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.semgrep-app-token }}
        run: |
          python3 -m pip install semgrep --quiet
          semgrep scan \
            --config "${{ inputs.semgrep-config }}" \
            --sarif \
            --output semgrep.sarif \
            . || true

      - name: Check Code Scanning availability
        id: ghas
        if: always() && hashFiles('semgrep.sarif') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.gh-token }}
        run: |
          http=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          [[ "$http" == "200" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Upload Semgrep SARIF to GitHub Security
        if: always() && steps.ghas.outputs.enabled == 'true' && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif-report
          path: semgrep.sarif
          if-no-files-found: ignore
