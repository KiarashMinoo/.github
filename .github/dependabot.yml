version: 2
updates:
  # This repo is the org profile/reusable-workflows repo — no .csproj, package.json,
  # or Dockerfile live here, so only the github-actions ecosystem applies.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "security"
      - "ci"
    open-pull-requests-limit: 5
