name: Cleanup GitHub Packages

on:
  workflow_dispatch:
    inputs:
      package_name_filter:
        description: 'Package name filter (supports * and ?)'
        required: true
        default: 'ThunderPropagator.BuildingBlocks*'

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run package cleanup script
        shell: pwsh
        env:
          # Personal Access Token with 'read:packages' and 'delete:packages' permissions
          # Create at: https://github.com/settings/tokens?type=beta
          # Add to repo secrets: https://github.com/KiarashMinoo/ThunderPropagator.BuildingBlocks/settings/secrets/actions
          GH_PAT: ${{ secrets.PACKAGE_CLEANUP_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          # We only pass the filter; username is inferred from git remote,
          # token is picked up from GH_PAT env by your script.
          ./.github/scripts/Delete-GitHubPackages.ps1 `
            -PackageNameFilter '${{ github.event.inputs.package_name_filter }}'
